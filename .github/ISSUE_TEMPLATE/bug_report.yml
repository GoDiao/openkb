name: Bug report
description: Something is broken or regressed
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. OpenKB v1.x targets **localhost / private network** deployments. See [SECURITY.md](SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. OPENKB_ROOT=...
        2. uv run openkb serve ...
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenKB version
      placeholder: "1.1.0 or git commit"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste CLI output or attach screenshots
