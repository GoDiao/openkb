name: Feature request
description: Suggest an enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: Who is this for — agents, humans, ops?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Web Hub
        - Agent skill / onboarding
        - Roadmap / docs
        - Security / deployment
        - Other
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I understand v1.x has no auth — LAN/self-host only unless I add a proxy
          required: true
